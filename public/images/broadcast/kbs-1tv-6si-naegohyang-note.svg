<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">KBS 1TV 6시 내고향 방송 정보 대표 이미지</title>
  <desc id="desc">관련 사진이 없을 때 사용하는 KBS 1TV 6시 내고향 방송 정보용 대표 마크 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset="0.5" stop-color="#15803d"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#022c22" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1000" cy="130" r="180" fill="#ffffff" opacity="0.10"/>
  <circle cx="180" cy="560" r="220" fill="#ffffff" opacity="0.08"/>
  <g filter="url(#shadow)">
    <rect x="150" y="150" width="900" height="375" rx="52" fill="#ffffff" opacity="0.94"/>
    <text x="600" y="282" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="88" font-weight="900" fill="#14532d">KBS 1TV</text>
    <text x="600" y="370" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="52" font-weight="800" fill="#0f172a">6시 내고향 방송 정보</text>
    <text x="600" y="438" text-anchor="middle" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="28" font-weight="600" fill="#475569">관련 사진 확인 전 사용되는 방송사 표기 이미지</text>
  </g>
</svg>
