    <radialGradient id="plate" cx="50%" cy="48%" r="48%"><stop offset="0" stop-color="#fffaf0"/><stop offset="1" stop-color="#f8fafc"/></radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#7c2d12" flood-opacity="0.22"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="210" cy="145" r="95" fill="#ffffff" opacity="0.28"/>
  <circle cx="1040" cy="560" r="140" fill="#ffffff" opacity="0.22"/>
