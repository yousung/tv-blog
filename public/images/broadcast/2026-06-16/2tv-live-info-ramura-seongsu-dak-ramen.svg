    <path d="M420 395 C510 345, 690 345, 780 395" fill="none" stroke="#92400e" stroke-width="18" stroke-linecap="round" opacity="0.38"/>
    <path d="M450 430 C535 380, 670 385, 750 430" fill="none" stroke="#b45309" stroke-width="14" stroke-linecap="round" opacity="0.30"/>
    <circle cx="495" cy="355" r="16" fill="#ef4444" opacity="0.85"/>
    <circle cx="705" cy="355" r="16" fill="#16a34a" opacity="0.85"/>
    <circle cx="625" cy="445" r="12" fill="#ffffff" opacity="0.95"/>
