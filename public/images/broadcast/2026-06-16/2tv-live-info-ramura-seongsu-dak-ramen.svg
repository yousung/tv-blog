  <text x="120" y="173" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="25" font-weight="600" fill="#9a3412">2TV 생생정보 성수동 방송 맛집</text>
  <text x="90" y="622" font-family="Apple SD Gothic Neo, Pretendard, Noto Sans KR, sans-serif" font-size="20" fill="#7c2d12" opacity="0.82">※ 방송/업체 정보를 바탕으로 만든 참고용 대표 이미지입니다. 실제 메뉴 사진은 공식 자료 확인 후 교체 예정.</text>
