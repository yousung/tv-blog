  <defs>
    <linearGradient id="bg" x1="42" y1="38" x2="1120" y2="594" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCFCE7" />
      <stop offset="1" stop-color="#BFDBFE" />
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="1160" height="590" rx="36" fill="url(#bg)" />
  <rect x="58" y="58" width="1084" height="514" rx="28" fill="#F8FFFB" />
