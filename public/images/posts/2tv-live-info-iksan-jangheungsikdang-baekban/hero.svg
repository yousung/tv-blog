<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">익산 장흥식당 고등어조림 백반 대표 정보 카드</title>
  <desc id="desc">2TV 생생정보에 나온 익산 장흥식당 방문 정보를 담은 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="44" y1="42" x2="1136" y2="588" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF3C7" />
      <stop offset="1" stop-color="#FDE2E8" />
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="1160" height="590" rx="36" fill="url(#bg)" />
  <rect x="58" y="58" width="1084" height="514" rx="28" fill="#FFFCFA" />
  <circle cx="960" cy="150" r="84" fill="#F59E0B" fill-opacity="0.2" />
  <circle cx="876" cy="456" r="112" fill="#FB7185" fill-opacity="0.16" />
  <rect x="84" y="92" width="238" height="42" rx="21" fill="#B45309" />
  <text x="203" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFBEB">KBS 2TV 생생정보</text>
  <text x="84" y="204" font-family="Arial, sans-serif" font-size="46" font-weight="800" fill="#111827">익산 황등 장흥식당</text>
  <text x="84" y="262" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#9A3412">고등어조림 백반으로 찾을 때</text>
  <text x="84" y="314" font-family="Arial, sans-serif" font-size="25" font-weight="500" fill="#374151">반찬 수보다 메인 한 가지가 더 중요합니다</text>
  <rect x="84" y="388" width="456" height="112" rx="24" fill="#FFF7ED" />
  <text x="114" y="430" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#9A3412">방송일</text>
  <text x="114" y="468" font-family="Arial, sans-serif" font-size="29" font-weight="800" fill="#7C2D12">2025년 5월 28일</text>
  <text x="114" y="498" font-family="Arial, sans-serif" font-size="19" font-weight="500" fill="#7C2D12">할매~ 밥 됩니까? 옥실 할매의 백반</text>
  <text x="740" y="214" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">방문 전 체크 포인트</text>
  <text x="740" y="258" font-family="Arial, sans-serif" font-size="21" font-weight="500" fill="#374151">1. 정말 백반 식사를 찾는지</text>
  <text x="740" y="296" font-family="Arial, sans-serif" font-size="21" font-weight="500" fill="#374151">2. 황등 일정과 함께 묶을지</text>
  <text x="740" y="334" font-family="Arial, sans-serif" font-size="21" font-weight="500" fill="#374151">3. 반찬 구성 변동 감안하기</text>
  <text x="740" y="372" font-family="Arial, sans-serif" font-size="21" font-weight="500" fill="#374151">4. 점심 피크 시간 피하기</text>
  <text x="84" y="546" font-family="Arial, sans-serif" font-size="18" font-weight="500" fill="#6B7280">tv.lovizu.com</text>
</svg>
