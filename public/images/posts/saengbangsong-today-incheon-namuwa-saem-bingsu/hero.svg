<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">인천 나무와 샘 생방송 투데이 정보 카드</title>
  <desc id="desc">인천 화수동 갤러리카페 나무와 샘의 방송 정보와 위치를 정리한 카드 이미지</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="76" y="72" width="1048" height="486" rx="28" fill="#ffffff" stroke="#d8c7a7" stroke-width="4"/>
  <rect x="840" y="122" width="210" height="280" rx="20" fill="#efe2c6"/>
  <circle cx="945" cy="230" r="78" fill="#ffffff"/>
  <text x="116" y="150" fill="#8a5a14" font-family="Arial, sans-serif" font-size="34" font-weight="700">SBS 생방송 투데이 4038회</text>
  <text x="116" y="242" fill="#111827" font-family="Arial, sans-serif" font-size="68" font-weight="800">나무와 샘 팥빙수</text>
  <text x="116" y="318" fill="#374151" font-family="Arial, sans-serif" font-size="34">인천 화수동 갤러리카페</text>
  <text x="116" y="410" fill="#4b5563" font-family="Arial, sans-serif" font-size="30">인천 동구 석수로 30</text>
  <text x="116" y="486" fill="#6b7280" font-family="Arial, sans-serif" font-size="26">방문 전 팥빙수 판매 여부 확인 권장</text>
</svg>
