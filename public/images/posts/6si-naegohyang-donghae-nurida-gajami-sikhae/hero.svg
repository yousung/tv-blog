  <rect x="54" y="54" width="1092" height="522" rx="28" fill="#ffffff" stroke="#fed7aa" stroke-width="3"/>
  <circle cx="1010" cy="150" r="78" fill="#fed7aa" opacity="0.9"/>
  <circle cx="1082" cy="234" r="38" fill="#f97316" opacity="0.22"/>
  <rect x="80" y="100" width="250" height="46" rx="23" fill="#f97316"/>
