  <text x="84" y="204" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="#111827">용인중앙시장 영광족발</text>
  <text x="84" y="264" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#9A3412">시장 골목에서 족발 찾을 때</text>
  <text x="84" y="316" font-family="Arial, sans-serif" font-size="25" font-weight="500" fill="#374151">시장 동선과 함께 보면 덜 헷갈립니다</text>
  <rect x="84" y="388" width="468" height="112" rx="24" fill="#FFF7ED" />
  <text x="114" y="430" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#9A3412">방송일</text>
  <text x="114" y="468" font-family="Arial, sans-serif" font-size="29" font-weight="800" fill="#7C2D12">2025년 4월 17일</text>
  <text x="114" y="498" font-family="Arial, sans-serif" font-size="19" font-weight="500" fill="#7C2D12">힘내라! 전통시장 용인중앙시장 편</text>
