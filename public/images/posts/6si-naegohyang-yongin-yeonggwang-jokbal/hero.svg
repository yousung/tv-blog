  <text x="742" y="296" font-family="Arial, sans-serif" font-size="21" font-weight="500" fill="#374151">2. 포장 위주인지 식사 위주인지</text>
  <text x="742" y="334" font-family="Arial, sans-serif" font-size="21" font-weight="500" fill="#374151">3. 주차보다 대중교통이 편한지</text>
  <text x="742" y="372" font-family="Arial, sans-serif" font-size="21" font-weight="500" fill="#374151">4. 다른 시장 메뉴와 함께 볼지</text>
  <text x="84" y="546" font-family="Arial, sans-serif" font-size="18" font-weight="500" fill="#6B7280">tv.lovizu.com</text>
