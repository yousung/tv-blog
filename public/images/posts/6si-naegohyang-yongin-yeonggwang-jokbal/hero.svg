<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">용인중앙시장 영광족발 대표 정보 카드</title>
  <desc id="desc">6시 내고향에 나온 용인중앙시장 영광족발 방문 포인트를 담은 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="48" y1="40" x2="1126" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A" />
      <stop offset="1" stop-color="#FECACA" />
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="1160" height="590" rx="36" fill="url(#bg)" />
  <rect x="58" y="58" width="1084" height="514" rx="28" fill="#FFFDF8" />
  <circle cx="943" cy="160" r="86" fill="#F97316" fill-opacity="0.22" />
  <circle cx="866" cy="448" r="110" fill="#FB7185" fill-opacity="0.18" />
  <rect x="84" y="92" width="218" height="42" rx="21" fill="#9A3412" />
