<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">진안 수선루 대표 정보 카드</title>
  <desc id="desc">2TV 생생정보에 나온 진안 수선루와 방문 포인트를 정리한 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="36" x2="1138" y2="592" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DBEAFE" />
      <stop offset="1" stop-color="#E9D5FF" />
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="1160" height="590" rx="36" fill="url(#bg)" />
  <rect x="58" y="58" width="1084" height="514" rx="28" fill="#FCFCFF" />
  <circle cx="958" cy="152" r="82" fill="#6366F1" fill-opacity="0.2" />
  <circle cx="892" cy="450" r="110" fill="#A855F7" fill-opacity="0.16" />
  <rect x="84" y="92" width="238" height="42" rx="21" fill="#3730A3" />
  <text x="203" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#EEF2FF">KBS 2TV 생생정보</text>
  <text x="84" y="204" font-family="Arial, sans-serif" font-size="50" font-weight="800" fill="#111827">진안 수선루</text>
  <text x="84" y="264" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#3730A3">바위 속 정자를 보러 갈 때</text>
  <text x="84" y="316" font-family="Arial, sans-serif" font-size="25" font-weight="500" fill="#374151">사진보다 구조를 먼저 보고 가면 더 재미있습니다</text>
  <rect x="84" y="388" width="430" height="112" rx="24" fill="#EEF2FF" />
  <text x="114" y="430" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#3730A3">방송일</text>
  <text x="114" y="468" font-family="Arial, sans-serif" font-size="29" font-weight="800" fill="#312E81">2025년 4월 7일</text>
  <text x="114" y="498" font-family="Arial, sans-serif" font-size="19" font-weight="500" fill="#312E81">바위 속에 지은 집이 있다?</text>
  <text x="736" y="214" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">방문 전 체크 포인트</text>
  <text x="736" y="258" font-family="Arial, sans-serif" font-size="21" font-weight="500" fill="#374151">1. 규모보다 구조를 보는 곳</text>
  <text x="736" y="296" font-family="Arial, sans-serif" font-size="21" font-weight="500" fill="#374151">2. 진안 다른 코스와 묶기</text>
  <text x="736" y="334" font-family="Arial, sans-serif" font-size="21" font-weight="500" fill="#374151">3. 멀리서와 가까이서 모두 보기</text>
  <text x="736" y="372" font-family="Arial, sans-serif" font-size="21" font-weight="500" fill="#374151">4. 바위 지형 주변 조심하기</text>
  <text x="84" y="546" font-family="Arial, sans-serif" font-size="18" font-weight="500" fill="#6B7280">tv.lovizu.com</text>
</svg>
