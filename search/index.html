t><link rel="stylesheet" href="/_astro/BaseLayout.CPDAA_Pw.css"></head> <body> <a class="skip-link" href="#main-content">본문으로 건너뛰기</a> <header class="site-header"> <div class="shell nav-shell"> <a class="brand" href="/" aria-label="오늘방송 노트 홈"> <span class="brand-mark">TV</span> <span><strong>오늘방송 노트</strong><small>맛집·지역·건강 방송정보</small></span> </a> <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">메뉴</button> <nav class="site-nav" id="site-nav" aria-label="주요 메뉴"> <a href="/">홈</a><a href="/programs/">프로그램</a><a href="/categories/">카테고리</a><a href="/search/">검색</a> </nav> </div> </header> <main id="main-content" class="shell">  <section class="article-header"> <p class="kicker">Search</p> <h1>방송 정보 검색</h1> <p class="lead">프로그램명, 지역명, 상호명, 건강 키워드로 글을 찾아보세요.</p> <form class="search-box" role="search"> <input id="search-input" name="q" type="search" placeholder="예: 생생정보 부산 보리밥" autocomplete="off"> <button type="submit">검색</button> </form> </section> <div id="search-results" class="grid two" aria-live="polite"></div>  </main> <footer class="site-footer"> <div class="shell footer-grid"> <div> <strong>오늘방송 노트</strong> <p>방송에 나온 장소와 정보를 공식 출처, 지도, 기사로 확인해 정리합니다.</p> </div> <nav aria-label="푸터 메뉴"> <a href="/privacy/">개인정보처리방침</a> <a href="/rss.xml">RSS</a> <a href="/search/">검색</a> </nav> </div> </footer> <script type="module">const e=document.querySelector(".nav-toggle"),n=document.querySelector(".site-nav");e?.addEventListener("click",()=>{const t=e.getAttribute("aria-expanded")!=="true";e.setAttribute("aria-expanded",String(t)),n?.classList.toggle("is-open",t)});</script> </body> </html> <script>
  const form = document.querySelector('.search-box');
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const params = new URLSearchParams(location.search);
  const initial = params.get('q') || '';
  if (input instanceof HTMLInputElement) input.value = initial;

  async function runSearch(query) {
    if (!results) return;
    const q = String(query || '').trim().toLowerCase();
    const index = await fetch('/search-index.json').then((res) => res.json());
    const matches = q
      ? index.filter((item) => [item.title, item.description, item.program, item.region, item.placeName, item.tags.join(' ')].join(' ').toLowerCase().includes(q))
      : [];
    results.replaceChildren();

    if (!matches.length) {
      const empty = document.createElement('p');
      empty.className = 'empty';
      empty.textContent = q ? '검색 결과가 없습니다.' : '검색어를 입력하세요.';
      results.append(empty);
      return;
    }

    for (const item of matches) {
      const article = document.createElement('article');
      article.className = 'post-card';

      const topline = document.createElement('div');
      topline.className = 'card-topline';
      const category = document.createElement('span');
      category.className = 'pill';
      category.textContent = item.category;
      const program = document.createElement('span');
      program.textContent = item.program;
      topline.append(category, program);

      const title = document.createElement('h2');
      const link = document.createElement('a');
      link.href = item.url;
      link.textContent = item.title;
      title.append(link);

      const description = document.createElement('p');
      description.textContent = item.description;

      const footer = document.createElement('footer');
      for (const value of [item.region, item.placeName].filter(Boolean)) {
        const span = document.createElement('span');
        span.textContent = value;
        footer.append(span);
      }

      article.append(topline, title, description, footer);
      results.append(article);
    }
  }

  form?.addEventListener('submit', (event) => {
    event.preventDefault();
    const query = input instanceof HTMLInputElement ? input.value : '';
    history.replaceState(null, '', query ? `/search/?q=${encodeURIComponent(query)}` : '/search/');
    runSearch(query);
  });
  runSearch(initial);
</script>
