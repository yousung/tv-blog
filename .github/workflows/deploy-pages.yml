name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        env:
          NAVER_CLIENT_KEY: ${{ secrets.NAVER_CLIENT_KEY || vars.NAVER_CLIENT_KEY }}
          PUBLIC_NAVER_CLIENT_KEY: ${{ secrets.NAVER_CLIENT_KEY || vars.NAVER_CLIENT_KEY }}
        run: |
          if [ -z "$NAVER_CLIENT_KEY" ]; then
            echo "NAVER_CLIENT_KEY is missing in GitHub Actions secrets/variables" >&2
            exit 1
          fi
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
